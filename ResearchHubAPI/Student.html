<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <script src="Scripts/jquery-3.7.0.min.js"></script>
    <script src="Scripts/Student.js"></script>
</head>
<body>
    <h1 style="text-align:center;">JavaScript CRUD Example Tutorial</h1>
    <hr />

    <div class="employee-form">

        <div>
            <label>Full Name*</label>
            <label class="validation-error hide" id="fullNameValidationError">
                This field is required.
            </label>
            <input type="text" name="fullName" id="fullName" />
        </div>

        <div>
            <label>Email Id</label>
            <input type="text" name="email" id="email" />
        </div>

        <div>
            <label>Roll No</label>
            <input type="text" name="rollNo" id="rollNo" />
        </div>

        <div>
            <label>Student Division</label>
            <input type="text" name="division" id="division" />
        </div>

        <div class="form-action-buttons">
            <input type="button" value="Submit" onclick="onFormSubmit()" />
        </div>
    </div>

    <br />

    <div class="employees-table">
        <table class="list" id="employeeList">
            <thead>
                <tr>
                    <th>Full Name</th>
                    <th>Email Id</th>
                    <th>Roll No</th>
                    <th>Student Division</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
    <script>
        // Ensure GetAllStudent is called when this page loads.
        (function () {
            try {
                if (typeof GetAllStudent === 'function') {
                    // If DOM already ready, call immediately; otherwise wait for DOMContentLoaded
                    if (document.readyState === 'complete' || document.readyState === 'interactive') {
                        GetAllStudent();
                    } else {
                        document.addEventListener('DOMContentLoaded', GetAllStudent);
                    }
                } else {
                    // If the function is not yet defined, attempt to call after DOM ready (script may load later)
                    document.addEventListener('DOMContentLoaded', function () {
                        if (typeof GetAllStudent === 'function') GetAllStudent();
                    });
                }
            } catch (e) {
                console.error('Error invoking GetAllStudent on load', e);
            }
        })();
    </script>
</body>
</html>
